<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>metaballs // tony wang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; height: 100%; background: #0a0a0a; overflow: hidden; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }
    /* nudge lil-gui toward the site's terminal aesthetic */
    .lil-gui {
      --font-family: 'JetBrains Mono', Consolas, Monaco, monospace;
      --font-size: 11px;
      --title-background-color: #0b0f14;
      --background-color: rgba(10, 10, 12, 0.82);
      --widget-color: #1a1f26;
      --focus-color: #64ffda;
      --hover-color: #232a32;
      --number-color: #64ffda;
      --string-color: #ff64da;
      backdrop-filter: blur(10px);
    }
    /* understated author credit at the bottom of the control panel */
    .gui-credit {
      display: block;
      padding: 8px 12px 9px;
      font-family: 'JetBrains Mono', Consolas, Monaco, monospace;
      font-size: 10px;
      letter-spacing: 0.03em;
      color: rgba(255, 255, 255, 0.28);
      text-decoration: none;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      transition: color 0.25s ease;
    }
    .gui-credit:hover { color: #64ffda; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
